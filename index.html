<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Python単語ゲーム</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: linear-gradient(135deg, #1e1e2f, #2a2a40);
  color: white;
  text-align: center;
}

/* ミュートボタン */
.muteBtn {
  position: fixed;
  top: 15px;
  right: 20px;
  background: #444;
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
}

.container {
  max-width: 900px;
  margin: 60px auto;
}

.card {
  background: #2f2f4f;
  padding: 40px;
  border-radius: 15px;
}

.word { font-size: 42px; }
.read { color:#aaa; margin-bottom:15px; }
.answer { display:none; font-size:22px; }

button {
  padding:10px 16px;
  margin:8px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.correct{background:#2ecc71;}
.wrong{background:#e74c3c;}
.show{background:#3498db;}
.switch{background:#f1c40f;color:black;}

.bigMessage {
  font-size: 36px;
  margin-top: 50px;
}
</style>
</head>

<body>

<div class="muteBtn" onclick="toggleMute()">🔊 音ON</div>

<div class="container">
<h2 id="modeTitle">通常モード</h2>
<button class="switch" onclick="toggleMode()">モード切替</button>

<div id="gameArea">
  <div class="card">
    <div class="word" id="word"></div>
    <div class="read" id="read"></div>
    <div class="answer" id="answer"></div>

    <button class="show" onclick="showAnswer()">答えを見る</button><br>

    <div id="judgeButtons" style="display:none;">
      <button class="correct" onclick="mark(true)">〇</button>
      <button class="wrong" onclick="mark(false)">✕</button>
    </div>
  </div>
</div>

<div id="emptyMessage" class="bigMessage" style="display:none;">
復習なし
</div>

<div style="margin-top:15px;">
復習リスト：<span id="reviewCount">0</span>
</div>

</div>

<script>

// =================
// 単語
// =================
const baseWords = [
{q:"print",r:"プリント",a:"表示する"},
{q:"input",r:"インプット",a:"入力する"},
{q:"if",r:"イフ",a:"条件分岐"},
{q:"elif",r:"エリフ",a:"それ以外でもし"},
{q:"else",r:"エルス",a:"それ以外"},
{q:"for",r:"フォー",a:"くりかえし"},
{q:"while",r:"ワイル",a:"条件ループ"},
{q:"break",r:"ブレイク",a:"ループ終了"},
{q:"continue",r:"コンティニュー",a:"次のループへ"},
{q:"def",r:"デフ",a:"関数作成"},
{q:"return",r:"リターン",a:"値を返す"},
{q:"import",r:"インポート",a:"読み込み"},
{q:"from",r:"フロム",a:"〜から"},
{q:"class",r:"クラス",a:"クラス作成"},
{q:"pass",r:"パス",a:"何もしない"},
{q:"True",r:"トゥルー",a:"真"},
{q:"False",r:"フォルス",a:"偽"},
{q:"and",r:"アンド",a:"かつ"},
{q:"or",r:"オア",a:"または"},
{q:"not",r:"ノット",a:"否定"},
{q:"in",r:"イン",a:"含まれる"},
{q:"len",r:"レン",a:"長さを取得"},
{q:"range",r:"レンジ",a:"範囲を作る"},
{q:"int",r:"イント",a:"整数に変換"},
{q:"str",r:"ストリング",a:"文字列に変換"},
{q:"float",r:"フロート",a:"小数に変換"},
{q:"list",r:"リスト",a:"リスト作成"},
{q:"dict",r:"ディクト",a:"辞書作成"},
{q:"set",r:"セット",a:"集合作成"},
{q:"tuple",r:"タプル",a:"変更不可リスト"},
{q:"append",r:"アペンド",a:"追加する"},
{q:"remove",r:"リムーブ",a:"削除する"},
{q:"pop",r:"ポップ",a:"取り出して削除"},
{q:"sort",r:"ソート",a:"並び替え"},
{q:"reverse",r:"リバース",a:"逆にする"},
{q:"open",r:"オープン",a:"ファイルを開く"},
{q:"close",r:"クローズ",a:"ファイルを閉じる"},
{q:"read",r:"リード",a:"読み込む"},
{q:"write",r:"ライト",a:"書き込む"},
{q:"with",r:"ウィズ",a:"自動で閉じる処理"},
{q:"try",r:"トライ",a:"エラーを試す"},
{q:"except",r:"エクセプト",a:"エラー処理"},
{q:"finally",r:"ファイナリー",a:"最後に必ず実行"}
];

// =================
// 状態
// =================
let normalQueue = [...baseWords];
let reviewList = JSON.parse(localStorage.getItem("reviewList")) || [];
let reviewMode = false;
let currentWord;

let isMuted = false;

// =================
// 音
// =================
const ok = new Audio("correct.mp3");
const ng = new Audio("wrong.mp3");
const bgm = new Audio("bgm.mp3");
bgm.loop = true;

document.body.addEventListener("click",()=>{
 if(!isMuted && bgm.paused) bgm.play();
},{once:true});

// =================
// ミュート
// =================
function toggleMute(){
  isMuted = !isMuted;

  document.querySelector(".muteBtn").innerText =
    isMuted ? "🔇 ミュート" : "🔊 音ON";

  if(isMuted){
    bgm.pause();
  }else{
    bgm.play();
  }
}

// =================
// 表示
// =================
function showQuestion(){

 document.getElementById("judgeButtons").style.display="none";

 if(reviewMode && reviewList.length===0){
   document.getElementById("gameArea").style.display="none";
   document.getElementById("emptyMessage").style.display="block";
   return;
 }

 document.getElementById("gameArea").style.display="block";
 document.getElementById("emptyMessage").style.display="none";

 if(reviewMode){
   currentWord = reviewList[0];
 }else{
   currentWord = normalQueue[0];
 }

 document.getElementById("word").innerText=currentWord.q;
 document.getElementById("read").innerText="（"+currentWord.r+"）";
 document.getElementById("answer").innerText=currentWord.a;
 document.getElementById("answer").style.display="none";
}

// =================
function showAnswer(){
 document.getElementById("answer").style.display="block";
 document.getElementById("judgeButtons").style.display="block";
}

// =================
// 判定
// =================
function mark(isCorrect){

 if(!isMuted){
   if(isCorrect){
     ok.currentTime=0; ok.play();
   }else{
     ng.currentTime=0; ng.play();
   }
 }

 if(isCorrect){
   if(reviewMode){
     reviewList.shift();
   }
 }else{
   if(!reviewMode){
     if(!reviewList.find(w=>w.q===currentWord.q)){
       reviewList.push(currentWord);
     }
   }
 }

 if(!reviewMode){
   normalQueue.push(normalQueue.shift());
 }

 save();
 updateUI();
 showQuestion();
}

// =================
function toggleMode(){
 reviewMode=!reviewMode;

 document.getElementById("modeTitle").innerText=
   reviewMode?"復習モード":"通常モード";

 document.body.style.background=
   reviewMode?"#000":"linear-gradient(135deg,#1e1e2f,#2a2a40)";

 showQuestion();
}

// =================
function save(){
 localStorage.setItem("reviewList",JSON.stringify(reviewList));
}

// =================
function updateUI(){
 document.getElementById("reviewCount").innerText=reviewList.length;
}

// =================
updateUI();
showQuestion();

</script>

</body>
</html>
