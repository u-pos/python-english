<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Python単語ゲーム 完全版</title>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: linear-gradient(135deg, #1e1e2f, #2a2a40);
  color: white;
  transition: 0.3s;
}

.container {
  max-width: 900px;
  margin: 40px auto;
  text-align: center;
}

.card {
  background: #2f2f4f;
  padding: 40px;
  border-radius: 15px;
}

.word { font-size: 42px; }
.read { color: #aaa; margin-bottom: 15px; }
.answer { display:none; font-size:22px; }

button {
  padding:10px 16px;
  margin:8px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.correct{background:#2ecc71;}
.wrong{background:#e74c3c;}
.show{background:#3498db;}
.switch{background:#f1c40f;color:black;}
.reset{background:#555;}

.info{margin-top:15px;}
</style>
</head>

<body>

<div class="container">
<h2 id="modeTitle">通常モード</h2>

<button class="switch" onclick="toggleMode()">モード切替</button>
<button class="reset" onclick="resetData()">リセット</button>

<div class="info">
レベル：<span id="level">1</span>　
復習：<span id="reviewCount">0</span>
</div>

<div class="card">
<div class="word" id="word"></div>
<div class="read" id="read"></div>
<div class="answer" id="answer"></div>

<button class="show" onclick="showAnswer()">答え</button><br>
<button class="correct" onclick="mark(true)">〇</button>
<button class="wrong" onclick="mark(false)">✕</button>
</div>
</div>

<script>
// =====================
// レベル別単語
// =====================
const levels = {
1:[
{q:"print",r:"プリント",a:"表示"},
{q:"if",r:"イフ",a:"条件分岐"},
{q:"for",r:"フォー",a:"くりかえし"},
{q:"while",r:"ワイル",a:"条件ループ"},
{q:"def",r:"デフ",a:"関数作成"},
{q:"return",r:"リターン",a:"値を返す"}
],
2:[
{q:"import",r:"インポート",a:"読み込み"},
{q:"from",r:"フロム",a:"〜から"},
{q:"as",r:"アズ",a:"別名"},
{q:"try",r:"トライ",a:"例外処理"},
{q:"except",r:"エクセプト",a:"エラー処理"}
],
3:[
{q:"class",r:"クラス",a:"クラス定義"},
{q:"with",r:"ウィズ",a:"自動処理"},
{q:"lambda",r:"ラムダ",a:"簡易関数"}
]
};

// =====================
let level = 1;
let reviewMode = false;

let reviewList = JSON.parse(localStorage.getItem("reviewList")) || [];
let mistakeCount = JSON.parse(localStorage.getItem("mistakeCount")) || {};

let currentWord;

// =====================
// 音
// =====================
const ok=new Audio("correct.mp3");
const ng=new Audio("wrong.mp3");
const bgm=new Audio("bgm.mp3");
bgm.loop=true;

document.body.addEventListener("click",()=>{
 if(bgm.paused)bgm.play();
},{once:true});

// =====================
// 出題（重み付きランダム）
// =====================
function getWeightedRandom(list){
 let pool=[];
 list.forEach(w=>{
   let weight=(mistakeCount[w.q]||1);
   for(let i=0;i<weight;i++){
     pool.push(w);
   }
 });
 return pool[Math.floor(Math.random()*pool.length)];
}

function showQuestion(){
 let list = reviewMode ? reviewList : levels[level];

 if(list.length===0){
   document.getElementById("word").innerText="復習なし";
   return;
 }

 currentWord = getWeightedRandom(list);

 document.getElementById("word").innerText=currentWord.q;
 document.getElementById("read").innerText="（"+currentWord.r+"）";
 document.getElementById("answer").innerText=currentWord.a;
 document.getElementById("answer").style.display="none";
}

// =====================
function showAnswer(){
 document.getElementById("answer").style.display="block";
}

// =====================
function mark(okFlag){
 if(okFlag){
   ok.currentTime=0; ok.play();

   if(reviewMode){
     reviewList = reviewList.filter(w=>w.q!==currentWord.q);
   }

   mistakeCount[currentWord.q]=Math.max((mistakeCount[currentWord.q]||1)-1,1);

 }else{
   ng.currentTime=0; ng.play();

   mistakeCount[currentWord.q]=(mistakeCount[currentWord.q]||1)+1;

   if(!reviewMode && !reviewList.find(w=>w.q===currentWord.q)){
     reviewList.push(currentWord);
   }
 }

 save();
 updateUI();
 showQuestion();
}

// =====================
function toggleMode(){
 reviewMode=!reviewMode;

 document.getElementById("modeTitle").innerText=
   reviewMode?"復習モード":"通常モード";

 document.body.style.background=
   reviewMode?"#000":"linear-gradient(135deg,#1e1e2f,#2a2a40)";

 showQuestion();
}

// =====================
function save(){
 localStorage.setItem("reviewList",JSON.stringify(reviewList));
 localStorage.setItem("mistakeCount",JSON.stringify(mistakeCount));
}

// =====================
function updateUI(){
 document.getElementById("reviewCount").innerText=reviewList.length;
 document.getElementById("level").innerText=level;

 // レベルアップ条件（適当）
 if(!reviewMode && reviewList.length===0 && level<3){
   level++;
 }
}

// =====================
function resetData(){
 if(confirm("リセットする？")){
   localStorage.clear();
   reviewList=[];
   mistakeCount={};
   level=1;
   updateUI();
   showQuestion();
 }
}

// =====================
updateUI();
showQuestion();

</script>
</body>
</html>
