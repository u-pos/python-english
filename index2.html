<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Python単語ゲーム</title>
<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: linear-gradient(135deg, #1e1e2f, #2a2a40);
  color: white;
}

.container {
  max-width: 900px;
  margin: 50px auto;
  text-align: center;
}

h1 {
  margin-bottom: 10px;
}

.card {
  background: #2f2f4f;
  padding: 40px;
  border-radius: 15px;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
  margin-top: 20px;
}

.word {
  font-size: 40px;
  margin-bottom: 20px;
}

.answer {
  font-size: 22px;
  color: #ccc;
  display: none;
}

button {
  padding: 12px 20px;
  margin: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
}

.show { background: #3498db; color: white; }
.correct { background: #2ecc71; }
.wrong { background: #e74c3c; }
.switch { background: #f1c40f; color: black; }

.score {
  margin-top: 15px;
  font-size: 18px;
}
</style>
</head>

<body>

<div class="container">
  <h1 id="modeTitle">通常モード</h1>
  <button class="switch" onclick="toggleMode()">モード切替</button>

  <div class="card">
    <div class="word" id="word"></div>
    <div class="answer" id="answer"></div>

    <button class="show" onclick="showAnswer()">答えを見る</button><br>

    <button class="correct" onclick="mark(true)">〇 正解</button>
    <button class="wrong" onclick="mark(false)">✕ 間違い</button>
  </div>

  <div class="score">
    正解: <span id="correctCount">0</span> /
    不正解: <span id="wrongCount">0</span>
  </div>
</div>

<script>
// =========================
// 単語データ
// =========================
const words = [
  {q:"print", a:"表示する"},
  {q:"if", a:"もし〜なら"},
  {q:"elif", a:"それ以外でもし"},
  {q:"else", a:"それ以外"},
  {q:"for", a:"くりかえし"},
  {q:"while", a:"〜の間くりかえす"},
  {q:"break", a:"ループを止める"},
  {q:"continue", a:"次へ進む"},
  {q:"def", a:"関数を作る"},
  {q:"return", a:"値を返す"},
  {q:"import", a:"読み込む"},
  {q:"from", a:"〜から"},
  {q:"as", a:"別名で"},
  {q:"class", a:"クラス"},
  {q:"try", a:"試す"},
  {q:"except", a:"エラー処理"},
  {q:"finally", a:"最後に必ず実行"},
  {q:"with", a:"〜と一緒に処理"},
  {q:"open", a:"ファイルを開く"},
  {q:"range", a:"範囲"},
  {q:"len", a:"長さ"},
  {q:"input", a:"入力する"},
  {q:"int", a:"整数に変換"},
  {q:"str", a:"文字列に変換"},
  {q:"float", a:"小数に変換"},
  {q:"list", a:"リスト"},
  {q:"dict", a:"辞書"},
  {q:"set", a:"集合"},
  {q:"tuple", a:"変更不可リスト"}
];

// =========================
// 状態
// =========================
let index = 0;
let correct = 0;
let wrong = 0;
let reviewMode = false;
let reviewList = [];

// =========================
// 音
// =========================
const correctSound = new Audio("correct.mp3");
const wrongSound = new Audio("wrong.mp3");
const bgm = new Audio("bgm.mp3");
bgm.loop = true;

// 初回クリックでBGM開始（ブラウザ制限対策）
document.body.addEventListener("click", () => {
  if (bgm.paused) bgm.play();
}, { once:true });

// =========================
// 表示
// =========================
function showQuestion(){
  const list = reviewMode ? reviewList : words;

  if(list.length === 0){
    document.getElementById("word").innerText = "復習データなし";
    return;
  }

  if(index >= list.length) index = 0;

  document.getElementById("word").innerText = list[index].q;
  document.getElementById("answer").innerText = list[index].a;
  document.getElementById("answer").style.display = "none";
}

function showAnswer(){
  document.getElementById("answer").style.display = "block";
}

// =========================
// 判定
// =========================
function mark(isCorrect){
  const list = reviewMode ? reviewList : words;
  const current = list[index];

  if(isCorrect){
    correct++;
    correctSound.currentTime = 0;
    correctSound.play();
  } else {
    wrong++;
    wrongSound.currentTime = 0;
    wrongSound.play();

    if(!reviewMode){
      reviewList.push(current);
    }
  }

  document.getElementById("correctCount").innerText = correct;
  document.getElementById("wrongCount").innerText = wrong;

  index++;
  showQuestion();
}

// =========================
// モード切替
// =========================
function toggleMode(){
  reviewMode = !reviewMode;
  index = 0;

  document.getElementById("modeTitle").innerText =
    reviewMode ? "復習モード" : "通常モード";

  showQuestion();
}

// 初期表示
showQuestion();
</script>

</body>
</html>
